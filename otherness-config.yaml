# otherness-config.yaml
# otherness running on itself.

project:
  name: otherness
  repo: pnz1990/otherness
  report_issue: 2
  board_url: ""
  pr_label: "otherness"
  # job_family: SDE  # SDE (default, backend/general) | FEE (frontend/UI) | SysDE (platform/infra)
  # otherness itself is markdown — no UI, no infrastructure. SDE default is correct; field omitted.

maqa:
  mode: standalone
  agents_path: ~/.otherness/agents
  status_update_cycles: 5
  product_validation_cycles: 3
  autonomous_mode: true    # operator has authorized agent to act on their behalf

ci:
  provider: github-actions
  github_actions:
    workflow: ci.yml
  wait_timeout_seconds: 600
  block_on_red: true

github_projects:
  project_id: ""
  project_number: ""
  linked_repo: pnz1990/otherness
  status_field_id: ""
  todo_option_id: ""
  in_progress_option_id: ""
  in_review_option_id: ""
  done_option_id: ""
  blocked_option_id: ""
  team_field_id: ""
  team_standalone_option_id: ""
  priority_field_id: ""
  priority_critical_option_id: ""
  priority_high_option_id: ""
  priority_medium_option_id: ""
  priority_low_option_id: ""
  size_field_id: ""
  size_xs_option_id: ""
  size_s_option_id: ""
  size_m_option_id: ""
  size_l_option_id: ""
  size_xl_option_id: ""
  start_date_field_id: ""
  target_date_field_id: ""

monitor:
  projects:
    - pnz1990/alibi
    - pnz1990/kardinal-promoter
    - pnz1990/kro-ui
    - pnz1990/otherness
  stale_hours: 24
  idle_hours: 4

# ── Scheduled execution ──────────────────────────────────────────────────────
# Enables the loop to run automatically via GitHub Actions without human action.
# Set up: add ANTHROPIC_API_KEY (or your provider key) to GitHub repo secrets.
# See .github/workflows/otherness-scheduled.yml and docs/design/19-scheduled-execution.md
schedule:
  cron: "0 */6 * * *"       # every 6 hours — adjust per project cadence
  model: "amazon-bedrock/global.anthropic.claude-sonnet-4-6"
  api_key_secret: "ANTHROPIC_API_KEY"   # GitHub Actions secret name containing the API key
