# maqa-config.yml — otherness configuration
# Copy this to your project root.

# ── Execution mode ────────────────────────────────────────────────────────────
# "standalone":         one session, plays all roles (unbounded)
# "bounded-standalone": one or more scoped sessions (boundary injected in prompt)
mode: "standalone"

# ── Agent files ───────────────────────────────────────────────────────────────
agents_path: "~/.otherness/agents"

# ── Parallelism ───────────────────────────────────────────────────────────────
# For bounded sessions: max concurrent engineer slots (informational only)
max_parallel: 3
