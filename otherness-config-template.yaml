# otherness-config.yaml — copy this to your project root and edit.
# This is the only file otherness needs from your project.

# ── Project identity ──────────────────────────────────────────────────────────
project:
  name: my-project                    # human-readable name
  repo: owner/repo                    # GitHub owner/repo
  report_issue: 1                     # issue number for agent reports
  board_url: ""                       # https://github.com/users/<owner>/projects/<N>
  pr_label: ""                        # label applied to all feature PRs (e.g. "myproject")

  # The engineering domain of this project. Controls which role identity the ENG
  # and QA agents adopt when implementing and reviewing code.
  #
  #   SDE     — backend service, API, CLI tool, library, data pipeline (default)
  #   FEE     — web app, mobile app, browser extension, any user-facing UI
  #   SysDE   — infrastructure-as-code, deployment pipelines, platform tooling,
  #             monitoring systems, developer tooling
  #
  # See ~/.otherness/agents/skills/role-based-agent-identity.md §Layer 2
  # for the full role definition applied to each value.
  job_family: SDE

# ── Execution mode ────────────────────────────────────────────────────────────
maqa:
  mode: standalone                    # standalone | bounded-standalone
  agents_path: ~/.otherness/agents    # path to agent instruction files

  # How often the unbounded standalone posts an executive status update to the
  # GitHub Projects board. Set in cycles (1 cycle = 1 item worked on). 0 = off.
  status_update_cycles: 5

  # How often the PM phase runs the actual product against user journeys.
  # Opens bug/doc issues for failures. Set in cycles. 0 = off.
  product_validation_cycles: 3

  # Autonomous mode — agent acts on the operator's behalf for CRITICAL changes.
  # When true: CRITICAL tier PRs are self-reviewed with logged reasoning and
  # merged autonomously if all safety checks pass. [NEEDS HUMAN] issues are
  # resolved by the agent directly. The loop never blocks waiting for human input.
  #
  # When false: CRITICAL tier PRs (changes to agents/standalone.md in the
  # *otherness repo itself*) require a human to review and merge them. For projects
  # other than the otherness repo, there are no CRITICAL tier files — leave this
  # true unless you are running otherness on the otherness source repo.
  #
  # Set to false only if: you are running otherness on the pnz1990/otherness repo
  # AND you want to personally review every change to the agent loop before it
  # deploys globally to all otherness users.
  autonomous_mode: true

  # Version pinning — pin to a specific otherness release tag for stability.
  # When set: agent checks out this tag at startup instead of pulling latest.
  # When empty: agent pulls latest main (current behavior — fine for most users).
  # To upgrade: run /otherness.upgrade to preview changelog and bump the pin.
  # Recommended for projects with >1 external contributor or production SLA.
  agent_version: ""     # e.g. "v1.0.0" — leave empty for latest

# ── CI gate ───────────────────────────────────────────────────────────────────
ci:
  provider: github-actions            # github-actions | circleci | gitlab | bitbucket

  github_actions:
    workflow: ci.yml

  circleci:
    org_slug: ""
    project_slug: ""

  gitlab:
    base_url: https://gitlab.com
    project_id: ""

  bitbucket:
    workspace: ""
    repo_slug: ""

  wait_timeout_seconds: 1200          # how long to poll CI before giving up
  block_on_red: true                  # block merge if CI is red

# ── GitHub Projects board ─────────────────────────────────────────────────────
# Leave project_id blank to disable board sync entirely.
github_projects:
  project_id: ""                      # PVT_kwHO... from GraphQL
  project_number: ""                  # numeric project number
  linked_repo: owner/repo             # same as project.repo

  # Status column field + options — run /otherness.setup to auto-populate via GitHub GraphQL
  status_field_id: ""
  todo_option_id: ""
  in_progress_option_id: ""
  in_review_option_id: ""
  done_option_id: ""
  blocked_option_id: ""

  # Team field
  team_field_id: ""
  team_engineer1_option_id: ""
  team_engineer2_option_id: ""
  team_engineer3_option_id: ""
  team_standalone_option_id: ""

  # Priority field
  priority_field_id: ""
  priority_critical_option_id: ""
  priority_high_option_id: ""
  priority_medium_option_id: ""
  priority_low_option_id: ""

  # Size field
  size_field_id: ""
  size_xs_option_id: ""
  size_s_option_id: ""
  size_m_option_id: ""
  size_l_option_id: ""
  size_xl_option_id: ""

  # Date fields
  start_date_field_id: ""
  target_date_field_id: ""

# ── Fleet monitoring ──────────────────────────────────────────────────────────
# List all projects managed by this otherness installation.
# Used by /otherness.status for cross-project health view, and by
# scripts/test.sh to pick a reference project for integration checks.
# The first non-otherness project in the list becomes the reference project.
monitor:
  projects: []
  #   - owner/your-project-name    # add your managed projects here
  stale_hours: 24    # alert if _state branch older than this many hours
  idle_hours: 4      # alert if no heartbeat within this many hours
